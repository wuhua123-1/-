<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>天堂社区</title>

    <style>
    /* ========== VIP/SVIP 特效 ========== */
/* ========== VIP/SVIP 特效 ========== */
.vip-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: linear-gradient(135deg, #1a1a0e, #0d0d05);
    color: #d4a843;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 14px;
    font-weight: 700;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(212,168,67,0.5);
}
.vip-badge::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -100%;
    width: 30%;
    height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
    transform: skewX(-25deg);
    animation: svipScan 2s ease-in-out infinite;
}
@keyframes svipScan {
    0% { left: -100%; }
    50% { left: 150%; }
    100% { left: 150%; }
}
.vip-text {
    background: linear-gradient(90deg, #d4a843, #f0d078, #d4a843);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: svipTextFlow 2s linear infinite;
    position: relative;
    z-index: 1;
}
@keyframes svipTextFlow {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
}
@keyframes 靓号Scan {
    0% { left: -100%; }
    50% { left: 100%; }
    100% { left: 100%; }
}
.online-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 3px;
}
        :root {
            --bg: #f5f5f5;
            --white: #fff;
            --blue: #12b7f5;
            --text-dark: #1a1a1a;
            --text-gray: #8a8a8a;
            --text-light: #b0b0b0;
            --border: #e5e5e5;
            --green: #07c160;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        .phone {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            background: #fff;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ========== 页面容器 + 动画 ========== */
        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: absolute;
            inset: 0;
            background: #fff;
            transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.35s ease;
            will-change: transform, opacity;
        }
        .page.active {
            display: flex;
            transform: translateX(0);
            opacity: 1;
        }
        .page.slide-in {
            display: flex;
            animation: slideInRight 0.35s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .page.slide-out {
            animation: slideOutLeft 0.35s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        .page.slide-back {
            display: flex;
            animation: slideBackRight 0.35s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0.8;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes slideOutLeft {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(-30%);
                opacity: 0.5;
            }
        }
        @keyframes slideBackRight {
            from {
                transform: translateX(-30%);
                opacity: 0.5;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== 消息列表页 ========== */
        .msg-list-page {
            background: #f5f5f5;
        }
        .nav-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 12px;
            flex-shrink: 0;
        }
        .nav-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .nav-avatar:active {
            transform: scale(0.9);
        }
        .nav-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .nav-info {
            flex: 1;
            min-width: 0;
        }
        .nav-nickname {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .nav-status {
            font-size: 12px;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            display: inline-block;
        }
        .nav-add-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.04);
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            transition: all 0.2s;
        }
        .nav-add-btn:active {
            background: rgba(0, 0, 0, 0.1);
            transform: scale(0.85);
        }
        .msg-list {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            margin-top: 8px;
            border-top: 1px solid var(--border);
        }
        .msg-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }
        .msg-item:active {
            background: #f0f0f0;
        }
        .msg-item-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .msg-item-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .msg-item-info {
            flex: 1;
            min-width: 0;
        }
        .msg-item-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .msg-item-preview {
            font-size: 13px;
            color: var(--text-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .msg-item-time {
            font-size: 12px;
            color: var(--text-light);
            flex-shrink: 0;
        }
        .bottom-nav {
            display: flex;
            background: #fff;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            color: var(--text-gray);
            font-size: 10px;
            gap: 2px;
            transition: color 0.2s;
        }
        .bottom-nav-item.active {
            color: var(--blue);
        }
        .bottom-nav-item .nav-icon {
            font-size: 22px;
        }

        /* ========== 悬浮菜单 ========== */
        .popup-menu-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .popup-menu {
            background: #fff;
            border-radius: 12px;
            margin: 60px 16px 0 0;
            padding: 8px 0;
            min-width: 140px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: top right;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.6);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .popup-menu-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-dark);
            transition: background 0.15s;
        }
        .popup-menu-item:active {
            background: #f0f0f0;
        }

        /* ========== 聊天页 ========== */
        .chat-page {
            background: #f5f5f5;
        }
        .chat-header {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 10px;
            flex-shrink: 0;
        }
        .chat-back {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-dark);
            padding: 4px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .chat-back:active {
            transform: scale(0.85);
        }
        .chat-title {
            font-size: 17px;
            font-weight: 600;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f5f5f5;
        }
        .chat-msg-row {
            display: flex;
            gap: 8px;
            max-width: 80%;
            align-items: flex-start;
        }
        .chat-msg-row.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .chat-msg-row.other {
            align-self: flex-start;
        }
        .chat-msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
            align-self: flex-start;
        }
        .chat-msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }
        .chat-msg-row.mine .chat-msg-bubble {
            background: #cceeff;
            border-top-right-radius: 4px;
        }
        .chat-msg-row.other .chat-msg-bubble {
            background: #fff;
            border-top-left-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: #fff;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        .chat-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: #f8f8f8;
            font-family: inherit;
        }
        .chat-input:focus {
            border-color: var(--blue);
            background: #fff;
        }
        .chat-send-btn {
            padding: 8px 16px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            flex-shrink: 0;
            transition: transform 0.2s, opacity 0.2s;
        }
        .chat-send-btn:active {
            transform: scale(0.9);
            opacity: 0.7;
        }

        /* ========== 个人主页（左对齐） ========== */
        .profile-page {
            background: #f5f5f5;
            overflow-y: auto;
        }
        .profile-header {
            background: #fff;
            padding: 20px 20px 16px;
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
        }
        .profile-back {
            position: absolute;
            left: 10px;
            top: 12px;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            color: var(--text-dark);
            transition: transform 0.2s;
            z-index: 2;
        }
        .profile-back:active {
            transform: scale(0.85);
        }
        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            overflow: hidden;
            transition: transform 0.2s;
            margin-left: 10px;
        }
        .profile-avatar:active {
            transform: scale(0.9);
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-header-info {
            flex: 1;
            min-width: 0;
        }
        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
        }
        .profile-th-id {
            font-size: 13px;
            color: var(--text-gray);
            margin-top: 2px;
        }
        .profile-tags {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .profile-tag {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 12px;
            background: #f0f0f0;
            color: var(--text-gray);
        }
        .profile-section {
            background: #fff;
            margin-top: 10px;
            padding: 0 16px;
        }
        .profile-section-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            color: var(--text-dark);
            cursor: pointer;
            transition: background 0.15s;
        }
        .profile-section-item:last-child {
            border-bottom: none;
        }
        .profile-section-item .item-left {
            color: var(--text-gray);
            font-size: 14px;
            flex-shrink: 0;
            margin-right: 12px;
            width: 60px;
        }
        .profile-section-item .item-right {
            flex: 1;
            text-align: right;
            color: var(--text-light);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .profile-section-item .item-right.has-value {
            color: var(--text-dark);
        }
        .profile-section-item .arrow {
            color: #ccc;
            font-size: 18px;
            margin-left: 6px;
        }
        .profile-space-section {
            background: #fff;
            margin-top: 10px;
            padding: 0 16px;
        }
        .profile-space-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-dark);
            transition: background 0.15s;
        }
        .profile-space-entry .arrow {
            color: #ccc;
            font-size: 18px;
        }
        .profile-space-photos {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            padding-bottom: 12px;
        }
        .profile-space-photo-dot {
            width: 100%;
            aspect-ratio: 1;
            background: #e8e8e8;
            border-radius: 4px;
        }
        .profile-edit-btn {
            text-align: center;
            padding: 20px;
            background: #f5f5f5;
        }
        .profile-edit-btn button {
            padding: 10px 40px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .profile-edit-btn button:active {
            transform: scale(0.9);
            opacity: 0.7;
        }

        /* ========== 他人主页 ========== */
        .user-profile-page {
            background: #f5f5f5;
            overflow-y: auto;
        }
        .user-profile-card {
            background: #fff;
            margin: 10px;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .user-profile-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            margin: 0 auto 10px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            overflow: hidden;
        }
        .user-profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-profile-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
        }
        .user-profile-th-id {
            font-size: 13px;
            color: var(--text-gray);
            margin-top: 4px;
        }
        .user-profile-space {
            background: #fff;
            margin: 10px;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-size: 15px;
            color: var(--text-dark);
            cursor: pointer;
            transition: background 0.15s;
        }
        .user-profile-space:active {
            background: #f0f0f0;
        }
        .user-profile-add-btn {
            text-align: center;
            padding: 10px;
        }
        .user-profile-add-btn button {
            padding: 10px 40px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .user-profile-add-btn button:active {
            transform: scale(0.9);
            opacity: 0.7;
        }

        /* ========== 搜索页 ========== */
        .search-page {
            background: #f5f5f5;
        }
        .search-header {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            gap: 8px;
            flex-shrink: 0;
        }
        .search-header input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 15px;
            outline: none;
            background: #f8f8f8;
            font-family: inherit;
        }
        .search-header input:focus {
            border-color: var(--blue);
            background: #fff;
        }
        .search-tabs {
            display: flex;
            background: #fff;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .search-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: var(--text-gray);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .search-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }
        .search-result-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }
        .search-result-item:active {
            background: #f0f0f0;
        }
        .search-result-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #e0e0e0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
        }
        .search-result-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .search-result-info {
            flex: 1;
        }
        .search-result-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-dark);
        }
        .search-result-th-id {
            font-size: 12px;
            color: var(--text-gray);
        }

        /* ========== 空间页 ========== */
        .space-page {
            background: #f5f5f5;
            overflow-y: auto;
        }
        .space-header {
            background: linear-gradient(135deg, #4a90d9, #6ab0ff);
            padding: 30px 20px 20px;
            color: #fff;
            position: relative;
        }
        .space-back {
            position: absolute;
            left: 12px;
            top: 12px;
            font-size: 22px;
            cursor: pointer;
            color: #fff;
            transition: transform 0.2s;
        }
        .space-back:active {
            transform: scale(0.85);
        }
        .space-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.4);
            object-fit: cover;
            background: rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        .space-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .space-name {
            font-size: 20px;
            font-weight: 700;
            margin-top: 8px;
        }
        .space-posts {
            background: #fff;
            margin-top: 8px;
            padding: 16px;
            min-height: 200px;

function navigateTo(pageId, animation) {
    var oldPage = document.querySelector('.page.active');
    var newPage = document.getElementById(pageId);
    if (oldPage === newPage) return;
    pageHistory.push(oldPage ? oldPage.id : null);

    // 清理所有页面的动画class
    document.querySelectorAll('.page').forEach(function(p) {
        p.classList.remove('slide-in', 'slide-out', 'slide-back');
    });

    if (animation === 'slideInRight') {
        if (oldPage) {
            oldPage.classList.add('slide-out');
            oldPage.addEventListener('animationend', function() {
                oldPage.classList.remove('active', 'slide-out');
                oldPage.style.display = 'none';
            }, { once: true });
        }
        newPage.style.display = 'flex';
        newPage.classList.add('slide-in');
        newPage.addEventListener('animationend', function() {
            newPage.classList.remove('slide-in');
            newPage.classList.add('active');
        }, { once: true });
    } else if (animation === 'slideBack') {
        if (oldPage) {
            oldPage.classList.remove('active');
            oldPage.style.display = 'none';
        }
        newPage.style.display = 'flex';
        newPage.classList.add('active');
    } else {
        if (oldPage) {
            oldPage.classList.remove('active');
            oldPage.style.display = 'none';
        }
        newPage.classList.add('active');
        newPage.style.display = 'flex';
    }
}

function goBack() {
    // 清理重复的连续相同页面
    while (pageHistory.length > 1 && pageHistory[pageHistory.length - 1] === pageHistory[pageHistory.length - 2]) {
        pageHistory.pop();
    }
    var prevPageId = pageHistory.pop();
    if (!prevPageId) { navigateTo('msgListPage', 'slideBack'); return; }
    navigateTo(prevPageId, 'slideBack');
}

    document.body.appendChild(overlay);

}

    var name = target === 'robot' ? '雾化机器人' : (friends[target] ? friends[target].nickname || target : target);
    document.getElementById('chatTitle').textContent = name;
    navigateTo('chatPage', 'slideInRight');
    loadAndRenderChat();
    if (target === 'robot') {
        setTimeout(function() {
            var chatPath = [userId, 'robot'].sort().join('_');
            db.ref('tth_chat/' + chatPath).once('value', function(snap) {
                if (!snap.val() || Object.keys(snap.val()).length === 0) {
                    var w = { from: 'robot', text: '你好！我是雾化机器人🤖', time: Date.now(), type: 'text' };
                    db.ref('tth_chat/' + chatPath + '/welcome').set(w);
                }
            });
        }, 300);
    }
}
function loadAndRenderChat() {
    var chatPath = [userId, currentChat].sort().join('_');
    db.ref('tth_chat/' + chatPath).on('value', function(snap) {
        if (!chatMessages[currentChat]) chatMessages[currentChat] = {};
        chatMessages[currentChat] = snap.val() || {};
        renderChatMessages();
    });
}



function renderChatMessages() {
    var container = document.getElementById('chatMessages');
    container.innerHTML = '';
    var msgs = chatMessages[currentChat] || {};
    var keys = Object.keys(msgs).sort(function(a, b) { return msgs[a].time - msgs[b].time; });
    keys.forEach(function(k) {
        var msg = msgs[k];
        var isMine = msg.from === userId;
        var row = document.createElement('div');
        row.className = 'chat-msg-row ' + (isMine ? 'mine' : 'other');
        var avatar = document.createElement('div');
        avatar.className = 'chat-msg-avatar';
        if (isMine) {
            avatar.innerHTML = userData.avatar ? '<img src="' + userData.avatar + '">' : '👤';
        } else {
    if (msg.from === 'robot') {
        avatar.textContent = '🤖';
} else {
    avatar.setAttribute('data-uid', msg.from);
    avatar.style.cursor = 'pointer';
    avatar.onclick = function() { viewUser(msg.from); };
    // 用 on 实时监听对方头像和名字变化
    db.ref('tth_users/' + msg.from).on('value', function(snap) {
        var u = snap.val() || {};
        avatar.innerHTML = u.avatar ? '<img src="' + u.avatar + '">' : '👤';
        // 同时更新消息列表里的好友信息
        if (friends[msg.from]) {
            friends[msg.from].nickname = u.nickname || msg.from;
            friends[msg.from].avatar = u.avatar || '';
            renderMsgList();
        }
});
}
}  
            
        var bubble = document.createElement('div');
bubble.className = 'chat-msg-bubble';
if (msg.type === 'image') {
    bubble.innerHTML = '<img src="' + msg.text + '" style="max-width:200px;border-radius:8px;">';
} else {
    bubble.textContent = msg.text;
}
if (isMine) {
    row.appendChild(avatar);
    row.appendChild(bubble);
} else {
    row.appendChild(avatar);
    row.appendChild(bubble);
}
        container.appendChild(row);
    });
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;
    input.value = '';
    
    var chatPath = [userId, currentChat].sort().join('_');
    var key = 'msg_' + Date.now();
    var msgData = { from: userId, text: text, time: Date.now(), type: 'text' };
    
    // 先本地显示消息
    if (!chatMessages[currentChat]) chatMessages[currentChat] = {};
    chatMessages[currentChat][key] = msgData;
    renderChatMessages();
    
    // 再上传到服务器
    db.ref('tth_chat/' + chatPath + '/' + key).set(msgData);
    
    if (currentChat === 'robot') {
        setTimeout(function() {
            var rk = 'reply_' + Date.now();
            var rd = { from: 'robot', text: getRobotReply(text), time: Date.now(), type: 'text' };
            chatMessages[currentChat][rk] = rd;
            renderChatMessages();
            db.ref('tth_chat/' + chatPath + '/' + rk).set(rd);
        }, 500);
    }
}

function sendImage() {
    var file = document.getElementById('chatImageInput').files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        var chatPath = [userId, currentChat].sort().join('_');
        var key = 'img_' + Date.now();
        var msgData = { from: userId, text: e.target.result, time: Date.now(), type: 'image' };
        if (!chatMessages[currentChat]) chatMessages[currentChat] = {};
        chatMessages[currentChat][key] = msgData;
        renderChatMessages();
        db.ref('tth_chat/' + chatPath + '/' + key).set(msgData);
    };
    reader.readAsDataURL(file);
    document.getElementById('chatImageInput').value = '';
}

        function getRobotReply(msg) {
            var l = msg.toLowerCase();
            if (l.indexOf('你好') !== -1) return '你好呀~ 😊';
            if (l.indexOf('你是谁') !== -1) return '我是雾化机器人！';
            if (l.indexOf('天气') !== -1) return '今天天气不错~ ☀️';
            return '收到你的消息了~';
        }

        

        function goBackFromSearch() { goBack(); }

        function setSearchTab(tab, el) {
            currentSearchTab = tab;
            document.querySelectorAll('.search-tab').forEach(function(t) { t.classList.remove('active'); });
            el.classList.add('active');
            document.getElementById('searchResults').innerHTML = '';
        }

function doSearch() {
    var query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    document.getElementById('searchResults').innerHTML = '<div style="text-align:center;padding:40px;color:#b0b0b0;">搜索中...</div>';
    
    db.ref('tth_users').once('value', function(snap) {
        var results = [];
        snap.forEach(function(child) {
            var u = child.val();
            if (child.key !== userId && (child.key.indexOf(query) !== -1 || (u.nickname && u.nickname.indexOf(query) !== -1))) {
                results.push({ id: child.key, data: u });
            }
        });
        renderSearchResults(results);
    });
}

        function renderSearchResults(results) {
            var el = document.getElementById('searchResults');
            if (results.length === 0) { el.innerHTML =
                    '<div style="text-align:center;padding:40px;color:#b0b0b0;">未找到相关用户</div>'; return; }
            el.innerHTML = results.map(function(r) {
                return '<div class="search-result-item" onclick="viewUser(\'' + r.id +
                    '\')"><div class="search-result-avatar">' + (r.data.avatar ? '<img src="' + r.data.avatar + '">' :
                    '👤') + '</div><div class="search-result-info"><div class="search-result-name">' + (r.data.nickname ||
                    r.id) + '</div><div class="search-result-th-id">天堂号：' + r.id + '</div></div></div>';
            }).join('');
        }

function viewUser(uid) {
    db.ref('tth_users/' + uid).on('value', function(snap) {
        var u = snap.val() || {};
        viewingUser = uid;
        document.getElementById('userProfileAvatar').innerHTML = u.avatar ? '<img src="' + u.avatar + '">' : '👤';
        document.getElementById('userProfileName').textContent = u.nickname || uid;
        document.getElementById('userProfileThId').textContent = '天堂号：' + uid;
        document.getElementById('userProfileSignature').textContent = u.signature || '这个用户很懒，什么都没写';
        document.getElementById('userProfileAddBtn').style.display = 'block';
        var addBtn = document.getElementById('userProfileAddBtn').querySelector('button:first-child');
        var msgBtn = document.getElementById('userProfileAddBtn').querySelector('button:last-child');
        if (friends[uid]) { addBtn.style.display = 'none'; msgBtn.style.display = 'inline-block'; }
        else { addBtn.style.display = 'inline-block'; msgBtn.style.display = 'none'; }
    });
    var currentPage = document.querySelector('.page.active');
// 如果当前在聊天页，先清理历史再跳转
if (currentPage && currentPage.id === 'chatPage') {
    // 确保历史记录里聊天页只出现一次
    var last = pageHistory[pageHistory.length - 1];
    if (last !== 'chatPage') {
        pageHistory.push('chatPage');
    }
}
navigateTo('userProfilePage', 'slideInRight');;
}

function addFriendSilent(uid) {
    db.ref('tth_users/' + uid).once('value', function(snap) {
        var u = snap.val() || {};
        friends[uid] = { nickname: u.nickname || uid, avatar: u.avatar || '', signature: u.signature || '', thId: uid };
        db.ref('tth_friends/' + userId + '/' + uid).set(friends[uid]);
        db.ref('tth_friends/' + uid + '/' + userId).set({ nickname: userData.nickname || userId, avatar: userData.avatar || '', signature: userData.signature || '', thId: userId });
    });
}

window.sendMessageToUser = function() {
    if (!viewingUser) return;
    if (!friends[viewingUser]) {
        addFriendSilent(viewingUser);
    }
    openChat(viewingUser);
};

}
